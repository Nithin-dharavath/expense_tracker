{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" step="0.01" id="amount" name="amount"
                           class="form-input" placeholder="0.00"
                           value="{{ expense.amount }}"
                           required autofocus>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if cat == expense.category %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ expense.date }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="e.g. Lunch with friends"
                           value="{{ expense.description or '' }}"
                           >
                </div>

                <button type="submit" class="btn-submit">Update Expense</button>
            </form>
        </div>

    </div>
</section>

{% endblock %}
